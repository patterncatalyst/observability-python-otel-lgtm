# stack/compose.yaml
#
# The one shared stack for every demo. Bring it up once from this directory:
#
#   podman compose up --build
#
# Edges (from the host):
#   Grafana UI : http://localhost:3000
#   Order REST : http://localhost:8080        (POST /orders, GET /orders/{id})
#   Review GQL : http://localhost:8081/graphql
#   Kafka UI   : http://localhost:8090
#
# Service-to-service (inside the compose network):
#   inventory gRPC : inventory:50051
#   payment gRPC   : payment:50052
#   Kafka          : kafka:9094
#   Postgres       : postgres:5432  (db: appdb)
#   Telemetry      : http://lgtm:4318  (OTLP/HTTP)
#
# ~3.5 GB across all services on a fresh start; give the Podman machine >= 6 GB.

# Shared service environment, merged into each app service via the anchor.
# OTEL_SDK_DISABLED defaults to false (instrumented); the no-telemetry baseline
# demo overrides it by exporting OTEL_SDK_DISABLED=true before `compose up`.
x-service-env: &service_env
  DATABASE_URL: postgres://appuser:apppass@postgres:5432/appdb
  KAFKA_BOOTSTRAP: kafka:9094
  OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_SDK_DISABLED: "${OTEL_SDK_DISABLED:-false}"
  # Kafka trace propagation: on by default; Demo 2 exports =false to show the
  # trace breaking at the message boundary, Demo 5 =true to show the fix.
  PROPAGATE_KAFKA_CONTEXT: "${PROPAGATE_KAFKA_CONTEXT:-true}"
  DEPLOY_ENV: local
  SERVICE_VERSION: dev

x-build: &service_build
  context: ..
  dockerfile: services/Containerfile

services:
  # --- Observability: the all-in-one Grafana LGTM image -------------------
  lgtm:
    image: docker.io/grafana/otel-lgtm:0.8.1
    container_name: lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9090:9090"   # Mimir / Prometheus
      - "3100:3100"   # Loki
      - "3200:3200"   # Tempo
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      # Swap for otelcol/config.tail-sampling.yaml in the sampling demo.
      - ./otelcol/config.yaml:/otel-lgtm/otelcol-config.yaml:Z
      - ./grafana/datasources.yaml:/otel-lgtm/grafana/conf/provisioning/datasources/datasources.yaml:Z
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # --- Postgres (one db, all domains; see db/init/01-schema.sql) ----------
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data:Z
      - ./db/init:/docker-entrypoint-initdb.d:Z
    mem_limit: 1g
    command: ["postgres", "-c", "log_statement=all", "-c", "shared_buffers=128MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # --- Kafka (single KRaft broker) ----------------------------------------
  kafka:
    image: docker.io/apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"   # host clients
      - "9094:9094"   # compose-internal clients
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,DOCKER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,DOCKER://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data:Z
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  kafka-ui:
    image: docker.io/provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # --- Domain services ----------------------------------------------------
  inventory:
    build: { <<: *service_build, args: { SERVICE: inventory } }
    image: localhost/otel-demo-inventory:latest
    container_name: inventory
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: inventory
    depends_on:
      postgres: { condition: service_healthy }
      lgtm: { condition: service_healthy }

  payment:
    build: { <<: *service_build, args: { SERVICE: payment } }
    image: localhost/otel-demo-payment:latest
    container_name: payment
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: payment
    depends_on:
      postgres: { condition: service_healthy }
      lgtm: { condition: service_healthy }

  order:
    build: { <<: *service_build, args: { SERVICE: order } }
    image: localhost/otel-demo-order:latest
    container_name: order
    ports:
      - "8080:8080"
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: order
      INVENTORY_ADDR: inventory:50051
      PAYMENT_ADDR: payment:50052
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      lgtm: { condition: service_healthy }
      inventory: { condition: service_started }
      payment: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  shipping:
    build: { <<: *service_build, args: { SERVICE: shipping } }
    image: localhost/otel-demo-shipping:latest
    container_name: shipping
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: shipping
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      lgtm: { condition: service_healthy }

  notification:
    build: { <<: *service_build, args: { SERVICE: notification } }
    image: localhost/otel-demo-notification:latest
    container_name: notification
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: notification
    depends_on:
      kafka: { condition: service_healthy }
      lgtm: { condition: service_healthy }

  review:
    build: { <<: *service_build, args: { SERVICE: review } }
    image: localhost/otel-demo-review:latest
    container_name: review
    ports:
      - "8081:8081"
    environment:
      <<: *service_env
      OTEL_SERVICE_NAME: review
    depends_on:
      postgres: { condition: service_healthy }
      lgtm: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  postgres-data:
  kafka-data:

networks:
  default:
    name: observability
