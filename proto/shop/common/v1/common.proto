// Shared message types used across the gRPC services.
// Compiled by scripts/gen-protos.sh into each service's generated/ package.
syntax = "proto3";

package shop.common.v1;

// Money as integer minor units (cents) plus an ISO-4217 currency code, so we
// never ship floating-point money across a wire.
message Money {
  int64 amount_cents = 1;
  string currency = 2;   // e.g. "USD"
}
