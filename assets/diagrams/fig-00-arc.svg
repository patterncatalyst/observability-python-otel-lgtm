<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="'Red Hat Text', system-ui, sans-serif" role="img">
<defs><marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#cc0000"/></marker></defs>
<rect x="20" y="210" width="900" height="70" rx="12" fill="#fdecec" stroke="#ddd"/>
<text x="32" y="230" font-size="12" font-weight="700" fill="#1d1d1d">one trace_id — end to end through every hop</text>
<rect x="40" y="80" width="220" height="95" rx="9" fill="#fdecec" stroke="#ee0000" stroke-width="2"/>
<text x="150.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">Foundations</text>
<text x="150.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">the stack + the services</text>
<text x="150.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">§0–§3</text>
<rect x="330" y="80" width="300" height="95" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="480.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">The three signals</text>
<text x="480.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">traces · metrics · logs</text>
<text x="480.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">→ one correlated view  ·  §4–§9</text>
<rect x="700" y="80" width="220" height="95" rx="9" fill="#ffffff" stroke="#111111" stroke-width="2"/>
<text x="810.0" y="118.0" font-size="13.5" font-weight="700" fill="#111111" text-anchor="middle">The pipeline</text>
<text x="810.0" y="135.0" font-size="11.5" fill="#555555" text-anchor="middle">sampling · profiling</text>
<text x="810.0" y="150.0" font-size="11.5" fill="#555555" text-anchor="middle">keep it affordable</text>
<path d="M260,127 L330,127" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M630,127 L700,127" fill="none" stroke="#b8650a" stroke-width="2" marker-end="url(#am)"/>
<path d="M150,175 L150,210" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M480,175 L480,210" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<path d="M810,175 L810,210" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a)"/>
<text x="470" y="45" font-size="12" fill="#1d1d1d" text-anchor="middle">Build it in three parts; the same trace_id threads through all of them, ending in one correlated view.</text>
</svg>